name: media_vault
description: An elegant Flutter application for discovering, classifying, and recommending movies and TV shows.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Routing
  go_router: ^12.1.1
  
  # UI & Design
  shimmer: ^3.0.0
  fl_chart: ^0.65.0
  glassmorphism: ^3.0.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  
  # Networking & CLI Script
  http: ^1.1.0
  
  # Utilities
  uuid: ^4.2.2
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/library_seed.json
    - assets/images/posters/
